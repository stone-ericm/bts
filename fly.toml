# Fly.io app configuration for BTS production
# Deploy with: flyctl deploy --remote-only
# Or via GitHub Actions on push to main

app = "bts-mlb"
primary_region = "iad"

[build]

[env]
  PYTHONUNBUFFERED = "1"
  UV_CACHE_DIR = "/tmp/uv-cache"
  BTS_HEARTBEAT_PATH = "/data/.heartbeat"
  TZ = "America/New_York"

[mounts]
  source = "data"
  destination = "/data"
  initial_size = "50gb"

[[services]]
  protocol = "tcp"
  internal_port = 3003
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 3003

  [services.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[services.http_checks]]
  interval = "60s"
  timeout = "5s"
  grace_period = "2m"
  method = "get"
  path = "/health"
  protocol = "http"
  tls_skip_verify = false

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 4096

[deploy]
  strategy = "immediate"
